services:
  postgres:
    image: postgres:16.0-alpine
    container_name: pawmate-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pawmatedb
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
